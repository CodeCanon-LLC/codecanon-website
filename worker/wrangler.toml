name = "codecanon-purchase-worker"
main = "src/index.ts"
compatibility_date = "2025-04-17"

[observability]
enabled = true
head_sampling_rate = 1

[[kv_namespaces]]
binding = "TOKENS"
id = "e681c21e282e4263be2a8dd3b59ea050"

# Secrets — set via: wrangler secret put <NAME>
# Required:
#   STRIPE_WEBHOOK_SECRET  — from Stripe Dashboard > Webhooks > signing secret
#   RESEND_API_KEY         — from resend.com
#   RESEND_FROM_EMAIL      — verified sender, e.g. "CodeCanon <noreply@orders.codecanon.dev>"

[env.staging]
name = "codecanon-purchase-worker-staging"

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[[env.staging.kv_namespaces]]
binding = "TOKENS"
id = "6ff1bb84eb894cc1a6bda2e8da3f4a6f"
